name: Fetch Odds Close Snapshot

on:
  schedule:
    # Closing-line capture sweep across the NHL puck-drop window.
    # NHL games for ET date D start ~7:00pm ET (00:00 UTC D+1) through
    # ~10:30pm ET (03:30 UTC D+1). The Odds API drops a game from the feed
    # once it starts, so a single late snapshot misses every early game and
    # leaves those bets with no true close (they fall back to a same-day,
    # pre-game proxy). We instead capture hourly across the window; the CLV
    # finder picks, per game, the latest snapshot in which that game still
    # appeared (its last pre-start line). Minute :17 avoids the heavily
    # congested top-of-hour GitHub Actions queue (less scheduling delay).
    # All files are labeled `close`; unique timestamps keep them distinct.
    - cron: '17 23 * * *'   # ~6:17pm ET — before first puck drop (catches every game)
    - cron: '17 0 * * *'    # ~7:17pm ET
    - cron: '17 1 * * *'    # ~8:17pm ET
    - cron: '17 2 * * *'    # ~9:17pm ET
    - cron: '17 3 * * *'    # ~10:17pm ET
    - cron: '17 4 * * *'    # ~11:17pm ET — true close for late West-coast games
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-odds-close:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Fetch close snapshot
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          ODDS_SNAPSHOT_LABEL: close
        run: uv run python fetch_odds.py

      - name: Commit and push if changes
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git diff --staged --quiet || git commit -m "Add close odds snapshot $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase origin main
          git push
